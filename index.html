<div id="player" class="mini-player">
        <img id="track-art" src="art1.png" alt="Art">
        <div class="track-info">
            <div id="track-name">Loading...</div>
            <div id="track-artist">Artist</div>
        </div>
        
        <div class="controls">
            <button id="play-pause-btn" onclick="togglePlay()">⏸️</button>
            <button id="skip-btn" onclick="nextTrack()">⏭️</button>
            
            <div class="volume-container">
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)">
            </div>
        </div>

        <audio id="main-audio"></audio>
    </div>

    <script>
        // ... (Keep your toggleSection function here)

        const playlist = [
            { name: "Wild Side", artist: "ALI", src: "https://files.catbox.moe/sj72f4.mp3", art: "art1.png" },
            { name: "Lydia", artist: "Highly Suspect", src: "https://files.catbox.moe/sqhwuf.mp3", art: "art2.png" },
            { name: "Jet Lag Mouth", artist: "In Color", src: "https://files.catbox.moe/go655j.mp3", art: "art3.png" },
            { name: "CHUCK THE MONEY", artist: "Stephen Sanchez", src: "https://files.catbox.moe/fv6cx6.mp3", art: "art4.png" },
            { name: "I Don't Care - Single Version", artist: "Fall Out Boy", src: "https://files.catbox.moe/ltlxt9.mp3", art: "art5.png" },
            { name: "glitter ✩‧₊˚", artist: "lexycat", src: "https://files.catbox.moe/7ye98c.mp3", art: "art6.png" }
        ];

        let currentTrack = 0;
        const audio = document.getElementById("main-audio");
        const playPauseBtn = document.getElementById("play-pause-btn");

        function loadTrack(index) {
            const track = playlist[index];
            audio.src = track.src;
            document.getElementById("track-name").innerText = track.name;
            document.getElementById("track-artist").innerText = track.artist;
            document.getElementById("track-art").src = track.art;
            audio.load();
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.innerText = "⏸️";
            } else {
                audio.pause();
                playPauseBtn.innerText = "▶️";
            }
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % playlist.length;
            loadTrack(currentTrack);
            audio.play();
            playPauseBtn.innerText = "⏸️";
        }

        function changeVolume(val) {
            audio.volume = val;
        }

        async function startSite() {
            document.getElementById("overlay").classList.add('fade-out');
            loadTrack(currentTrack);
            audio.volume = 0.5; // Default volume at 50%
            try {
                await audio.play();
                document.getElementById("player").classList.add('visible');
            } catch (err) { console.error(err); }
            setTimeout(() => { document.getElementById("overlay").style.display = "none"; }, 500);
        }

        audio.onended = () => { nextTrack(); };
        
        // ... (Keep your copyDiscord function here)
    </script>
